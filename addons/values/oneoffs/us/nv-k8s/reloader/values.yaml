# PLACEMENT + values for the one-off reloader on gitops-c3.
# The existence of this file (its path's cluster segment) is what deploys
# charts/oneoffs/reloader to gitops-c3. Values below are optional per-cluster tuning;
# an empty file would still place the chart here.
reloader:
  deployment:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
