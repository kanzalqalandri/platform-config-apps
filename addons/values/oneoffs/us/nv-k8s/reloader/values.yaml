# PLACEMENT + values for the one-off reloader on nv-k8s.
# The existence of this file (its path's cluster segment) is what deploys
# charts/oneoffs/reloader to nv-k8s. Values below are optional per-cluster tuning;
# an empty file would still place the chart here.
reloader:
  deployment:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
