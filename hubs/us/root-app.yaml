# Bootstrap for the US hub (ArgoCD on NV-MGMT, manages nv-k8s). Apply ONCE with kubectl on the
# hub; from then on the hub self-manages every Application from git via this
# app-of-apps.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-us
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kanzalqalandri/platform-config-apps
    targetRevision: main
    path: .
    helm:
      values: |
        region: us
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
